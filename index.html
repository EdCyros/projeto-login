<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log-In</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/media-queries.css">
<!-- Icones  -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" /></head>

<body>
    <main>
        <div id="image">
        </div>
        <div id="form">
            <h1>Login</h1>
            <p>Seja bem-vindo , faça o login para acessar sua conta.</p>
            <form action="cadastro.php" method="post" autocomplete="on">
                <div>
                    <span class="material-symbols-outlined">person</span>
                    <input type="email" name="email" id="emailid" autocomplete="email" placeholder="Seu E-mail" required maxlength="30">
                    <label for="emailid">Login</label>
                </div>
                <div>
                    <span class="material-symbols-outlined">key</span>
                    <input type="password" name="password" id="passwordid" autocomplete="current-password" placeholder="Sua senha" required minlength="4" >
                    <label for="passwordid">Senha</label>
                </div>
                <input type="submit" value="Enviar">
                <a href="#">Esqueci a senha <span class="material-symbols-outlined">mail_shield</span></a>
            </form>
        </div>
    </main>
</body>
</html>
